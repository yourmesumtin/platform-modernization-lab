apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-canary
  namespace: default
  labels:
    app: api
    track: canary
spec:
  replicas: 1          # 1 canary vs 2 stable = ~33% of traffic
  selector:
    matchLabels:
      app: api
      track: canary
  template:
    metadata:
      labels:
        app: api
        track: canary
    spec:
      containers:
        - name: api
          image: PLACEHOLDER
          ports:
            - containerPort: 8080

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"