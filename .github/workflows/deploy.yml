name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
          - all

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: api

jobs:

  # ── Job 1: Terraform Staging ──────────────────────────────
  terraform-staging:
    name: Terraform Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt Init
        working-directory: terragrunt/staging
        run: terragrunt run-all init --terragrunt-non-interactive

      - name: Terragrunt Plan
        working-directory: terragrunt/staging
        run: terragrunt run-all plan --terragrunt-non-interactive

      - name: Terragrunt Apply
        working-directory: terragrunt/staging
        run: terragrunt run-all apply --terragrunt-non-interactive
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    #   - uses: hashicorp/setup-terraform@v3

    #   - name: Terraform Init
    #     working-directory: live/staging
    #     run: terraform init

    #   - name: Terraform Apply
    #     working-directory: live/staging
    #     run: terraform apply -auto-approve
    #     env:
    #       TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    #       TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}





  # ── Job 2: Build and Push Image ───────────────────────────
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: terraform-staging
    outputs:
      image_tag: ${{ github.sha }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  # ── Job 3: Deploy to Staging ──────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name staging-eks-cluster

      - name: Deploy to staging
        env:
          ECR_REGISTRY: ${{ needs.build.outputs.ecr_registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          kubectl set image deployment/api \
            api=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          kubectl rollout status deployment/api

      - name: Smoke test staging
        run: |
          kubectl rollout status deployment/api --timeout=180s
          echo "Staging smoke test passed"

  # ── Job 4: Manual Approval Gate ───────────────────────────
  production-approval:
    name: Awaiting Production Approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production        # ← this is where manual approval lives

    steps:
      - name: Approved
        run: echo "Production deployment approved — proceeding"

  # ── Job 5: Terraform Production ───────────────────────────
  terraform-production:
    name: Terraform Production
    runs-on: ubuntu-latest
    needs: production-approval

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Terragrunt Init
        working-directory: terragrunt/production
        run: terragrunt run-all init --terragrunt-non-interactive

      - name: Terragrunt Plan
        working-directory: terragrunt/production
        run: terragrunt run-all plan --terragrunt-non-interactive

      - name: Terragrunt Apply
        working-directory: terragrunt/production
        run: terragrunt run-all apply --terragrunt-non-interactive
        env:
          TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    #   - uses: hashicorp/setup-terraform@v3

    #   - name: Terraform Init
    #     working-directory: live/production
    #     run: terraform init

    #   - name: Terraform Apply
    #     working-directory: live/production
    #     run: terraform apply -auto-approve
    #     env:
    #       TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
    #       TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

  # ── Job 6: Canary Deploy to Production ────────────────────
  deploy-production-canary:
    name: Canary Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, terraform-production]

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name production-eks-cluster

      - name: Apply canary deployment
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          # Replace image placeholder in canary manifest
          sed -i "s|PLACEHOLDER|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" \
            k8s/canary/deployment-canary.yaml
          kubectl apply -f k8s/canary/deployment-canary.yaml

      - name: Monitor canary for 60 seconds
        run: |
          echo "Watching canary pods for 60 seconds..."
          kubectl rollout status deployment/api-canary --timeout=60s
          
          # Check canary pods are healthy
          READY=$(kubectl get deployment api-canary \
            -o jsonpath='{.status.readyReplicas}')
          echo "Canary ready replicas: $READY"
          
          if [ "$READY" -lt "1" ]; then
            echo "Canary failed — rolling back"
            kubectl delete -f k8s/canary/deployment-canary.yaml
            exit 1
          fi
          echo "Canary healthy — proceeding to full rollout"

      - name: Full production rollout
        env:
          ECR_REGISTRY: ${{ needs.build.outputs.ecr_registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          kubectl set image deployment/api \
            api=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          kubectl rollout status deployment/api
          
          # Clean up canary
          kubectl delete -f k8s/canary/deployment-canary.yaml
          echo "Full production rollout complete"