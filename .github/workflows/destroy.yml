name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - staging
          - production
          - all
      confirm:
        description: 'Type DESTROY to confirm'
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2

jobs:
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "Confirmation failed. You must type DESTROY to proceed."
            exit 1
          fi
          echo "Confirmation validated — proceeding with destroy"

  destroy-staging:
    name: Destroy Staging
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'all' }}
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Terragrunt Destroy Staging
        working-directory: terragrunt/staging
        run: terragrunt run-all destroy --terragrunt-non-interactive
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    #   - uses: hashicorp/setup-terraform@v3

    #   - name: Terraform Init
    #     working-directory: live/staging
    #     run: terraform init

    #   - name: Terraform Destroy
    #     working-directory: live/staging
    #     run: terraform destroy -auto-approve
    #     env:
    #       TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    #       TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

  destroy-production:
    name: Destroy Production
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.inputs.environment == 'production' || github.event.inputs.environment == 'all' }}
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Terragrunt Destroy Staging
        working-directory: terragrunt/staging
        run: terragrunt run-all destroy --terragrunt-non-interactive
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    #   - uses: hashicorp/setup-terraform@v3

    #   - name: Terraform Init
    #     working-directory: live/production
    #     run: terraform init

    #   - name: Terraform Destroy
    #     working-directory: live/production
    #     run: terraform destroy -auto-approve
    #     env:
    #       TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
    #       TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}